<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Management System - PT. Akarsa Garment Indonesia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            transition: box-shadow 0.15s ease-in-out;
        }
        .card:hover {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .table th {
            border-top: none;
            font-weight: 600;
        }
        .badge {
            font-size: 0.875em;
        }
        .btn-group .btn {
            padding: 0.375rem 0.5rem;
            font-size: 0.875rem;
        }
        .navbar-brand {
            font-weight: 600;
        }
        .form-control:focus {
            border-color: #1b6ec2;
            box-shadow: 0 0 0 0.2rem rgba(27, 110, 194, 0.25);
        }
        .btn {
            border-radius: 0.375rem;
            font-weight: 500;
        }
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            white-space: nowrap;
            line-height: 60px;
        }
        body {
            margin-bottom: 60px;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-toggleable-sm navbar-light bg-white border-bottom box-shadow mb-3">
            <div class="container-fluid">
                <a class="navbar-brand" href="#" onclick="loadProducts()">Product Management</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target=".navbar-collapse" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse d-sm-inline-flex justify-content-between">
                    <ul class="navbar-nav flex-grow-1">
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="#" onclick="loadProducts()">Products</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <div class="container">
        <main role="main" class="pb-3" id="main-content">
            <!-- Content will be loaded here -->
        </main>
    </div>

    <footer class="border-top footer text-muted">
        <div class="container">
            &copy; 2024 - Product Management System - PT. Akarsa Garment Indonesia
        </div>
    </footer>
    
    <!-- Modals -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Product Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Product Management System - Client Side Only Demo
        let currentProducts = [];
        let nextId = 4;

        // Sample data
        const sampleProducts = [
            {
                Id: 1,
                Name: "Laptop Dell XPS 13",
                Description: "High-performance ultrabook with Intel Core i7 processor",
                Price: 1299.99,
                Stock: 15,
                CreatedAt: new Date().toISOString(),
                UpdatedAt: new Date().toISOString()
            },
            {
                Id: 2,
                Name: "iPhone 15 Pro",
                Description: "Latest Apple smartphone with A17 Pro chip",
                Price: 999.99,
                Stock: 25,
                CreatedAt: new Date().toISOString(),
                UpdatedAt: new Date().toISOString()
            },
            {
                Id: 3,
                Name: "Samsung Galaxy Watch 6",
                Description: "Smartwatch with health tracking features",
                Price: 299.99,
                Stock: 30,
                CreatedAt: new Date().toISOString(),
                UpdatedAt: new Date().toISOString()
            }
        ];

        // Initialize products
        function initializeProducts() {
            currentProducts = [...sampleProducts];
            nextId = 4;
            loadProducts();
        }

        // Load products
        function loadProducts(search = '') {
            let products = currentProducts;
            
            if (search) {
                products = products.filter(p => 
                    p.Name.toLowerCase().includes(search.toLowerCase())
                );
            }
            
            renderProductList(products);
        }

        // Render product list
        function renderProductList(products) {
            const mainContent = document.getElementById('main-content');
            
            let html = `
                <div class="container mt-4">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h1 class="h3">Product Management</h1>
                        </div>
                        <div class="col-md-6 text-end">
                            <button class="btn btn-primary" onclick="showCreateForm()">
                                Add New Product
                            </button>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-8">
                            <form onsubmit="handleSearch(event)" class="d-flex">
                                <input class="form-control me-2" type="text" id="searchInput" placeholder="Search products..." />
                                <button class="btn btn-outline-secondary" type="submit">Search</button>
                                <button class="btn btn-outline-secondary ms-2" type="button" onclick="loadProducts()">Clear</button>
                            </form>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>Name</th>
                                            <th>Price</th>
                                            <th>Stock</th>
                                            <th>Created At</th>
                                            <th class="text-center">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
            `;

            if (products.length === 0) {
                html += `
                    <tr>
                        <td colspan="5" class="text-center py-4">
                            <p class="text-muted">No products found. <a href="#" onclick="showCreateForm()">Add your first product</a>.</p>
                        </td>
                    </tr>
                `;
            } else {
                products.forEach(product => {
                    const stockBadge = getStockBadge(product.Stock);
                    const createdAt = new Date(product.CreatedAt).toLocaleDateString();
                    
                    html += `
                        <tr>
                            <td>
                                <strong>${product.Name}</strong>
                                <br />
                                <small class="text-muted">${product.Description || 'No description'}</small>
                            </td>
                            <td>$${product.Price.toFixed(2)}</td>
                            <td>${stockBadge}</td>
                            <td>${createdAt}</td>
                            <td class="text-center">
                                <div class="btn-group" role="group">
                                    <button class="btn btn-sm btn-info" onclick="viewProduct(${product.Id})">View</button>
                                    <button class="btn btn-sm btn-warning" onclick="editProduct(${product.Id})">Edit</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteProduct(${product.Id})">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
            `;

            mainContent.innerHTML = html;
        }

        // Get stock badge HTML
        function getStockBadge(stock) {
            let badgeClass = 'bg-danger';
            if (stock > 10) badgeClass = 'bg-success';
            else if (stock > 5) badgeClass = 'bg-warning';
            
            return `<span class="badge ${badgeClass}">${stock}</span>`;
        }

        // Handle search
        function handleSearch(event) {
            event.preventDefault();
            const searchValue = document.getElementById('searchInput').value;
            loadProducts(searchValue);
        }

        // Show create form
        function showCreateForm() {
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            
            modalTitle.textContent = 'Create New Product';
            modalBody.innerHTML = `
                <form onsubmit="handleCreateProduct(event)">
                    <div class="mb-3">
                        <label class="form-label">Name *</label>
                        <input type="text" class="form-control" id="productName" required />
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="productDescription" rows="3"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Price *</label>
                                <input type="number" class="form-control" id="productPrice" step="0.01" min="0.01" required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Stock *</label>
                                <input type="number" class="form-control" id="productStock" min="0" required />
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            `;
            
            const modal = new bootstrap.Modal(document.getElementById('productModal'));
            modal.show();
        }

        // Handle create product
        function handleCreateProduct(event) {
            event.preventDefault();
            
            const product = {
                Id: nextId++,
                Name: document.getElementById('productName').value,
                Description: document.getElementById('productDescription').value,
                Price: parseFloat(document.getElementById('productPrice').value),
                Stock: parseInt(document.getElementById('productStock').value),
                CreatedAt: new Date().toISOString(),
                UpdatedAt: new Date().toISOString()
            };
            
            currentProducts.push(product);
            bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
            showSuccess('Product created successfully!');
            loadProducts();
        }

        // View product
        function viewProduct(id) {
            const product = currentProducts.find(p => p.Id === id);
            
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            
            modalTitle.textContent = 'Product Details';
            modalBody.innerHTML = `
                <dl class="row">
                    <dt class="col-sm-3">Name:</dt>
                    <dd class="col-sm-9">${product.Name}</dd>

                    <dt class="col-sm-3">Description:</dt>
                    <dd class="col-sm-9">${product.Description || 'No description'}</dd>

                    <dt class="col-sm-3">Price:</dt>
                    <dd class="col-sm-9">$${product.Price.toFixed(2)}</dd>

                    <dt class="col-sm-3">Stock:</dt>
                    <dd class="col-sm-9">${getStockBadge(product.Stock)} units</dd>

                    <dt class="col-sm-3">Created At:</dt>
                    <dd class="col-sm-9">${new Date(product.CreatedAt).toLocaleString()}</dd>

                    <dt class="col-sm-3">Last Updated:</dt>
                    <dd class="col-sm-9">${new Date(product.UpdatedAt).toLocaleString()}</dd>
                </dl>
                
                <div class="d-flex justify-content-between">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <div>
                        <button type="button" class="btn btn-warning me-2" onclick="editProduct(${product.Id})">Edit</button>
                        <button type="button" class="btn btn-danger" onclick="deleteProduct(${product.Id})">Delete</button>
                    </div>
                </div>
            `;
            
            const modal = new bootstrap.Modal(document.getElementById('productModal'));
            modal.show();
        }

        // Edit product
        function editProduct(id) {
            const product = currentProducts.find(p => p.Id === id);
            
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            
            modalTitle.textContent = 'Edit Product';
            modalBody.innerHTML = `
                <form onsubmit="handleUpdateProduct(event, ${id})">
                    <div class="mb-3">
                        <label class="form-label">Name *</label>
                        <input type="text" class="form-control" id="productName" value="${product.Name}" required />
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="productDescription" rows="3">${product.Description || ''}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Price *</label>
                                <input type="number" class="form-control" id="productPrice" step="0.01" min="0.01" value="${product.Price}" required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Stock *</label>
                                <input type="number" class="form-control" id="productStock" min="0" value="${product.Stock}" required />
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Created At</label>
                        <input type="text" class="form-control" value="${new Date(product.CreatedAt).toLocaleString()}" readonly />
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning">Save Changes</button>
                    </div>
                </form>
            `;
            
            const modal = new bootstrap.Modal(document.getElementById('productModal'));
            modal.show();
        }

        // Handle update product
        function handleUpdateProduct(event, id) {
            event.preventDefault();
            
            const productIndex = currentProducts.findIndex(p => p.Id === id);
            currentProducts[productIndex] = {
                ...currentProducts[productIndex],
                Name: document.getElementById('productName').value,
                Description: document.getElementById('productDescription').value,
                Price: parseFloat(document.getElementById('productPrice').value),
                Stock: parseInt(document.getElementById('productStock').value),
                UpdatedAt: new Date().toISOString()
            };
            
            bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
            showSuccess('Product updated successfully!');
            loadProducts();
        }

        // Delete product
        function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) {
                return;
            }
            
            currentProducts = currentProducts.filter(p => p.Id !== id);
            showSuccess('Product deleted successfully!');
            loadProducts();
        }

        // Show success message
        function showSuccess(message) {
            const alert = document.createElement('div');
            alert.className = 'alert alert-success position-fixed top-0 start-50 translate-middle-x mt-3';
            alert.style.zIndex = '9999';
            alert.textContent = message;
            document.body.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 3000);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeProducts();
        });
    </script>
</body>
</html>
